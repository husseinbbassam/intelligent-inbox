version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: intelligent_inbox_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox_secret
      POSTGRES_DB: intelligent_inbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox -d intelligent_inbox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
